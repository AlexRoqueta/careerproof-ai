<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- This app is dark-only by design. We tell the browser the document is
         dark (color-scheme: dark) so iOS Safari paints form controls,
         scrollbars, and the rubber-band overscroll area with dark UA defaults
         even before the bundled CSS loads. -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#090e1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CareerProof AI — Is AI coming for your job? Check your AI risk.</title>
    <meta name="description" content="Check your AI job risk before your role changes. CareerProof AI gives you a clear, role-specific read on how exposed your job is to AI disruption — plus the skills and moves that protect your career." />
    <meta name="keywords" content="AI job risk, AI career risk, AI automation, career impact, AI exposure, future of work, AI displacement, career planning, AI proof career" />
    <link rel="canonical" href="https://careerproof.app/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CareerProof AI" />
    <meta property="og:url" content="https://careerproof.app/" />
    <meta property="og:title" content="Is AI coming for your job? — CareerProof AI" />
    <meta property="og:description" content="Check your AI job risk in under a minute. Get a clear, role-specific read on AI exposure — plus the skills and career moves that keep you ahead." />
    <meta property="og:image" content="https://careerproof.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Is AI coming for your job? — CareerProof AI" />
    <meta name="twitter:description" content="Check your AI job risk in under a minute. Role-specific exposure score, skills to build, and adjacent career moves." />
    <meta name="twitter:image" content="https://careerproof.app/og-image.png" />
    <!-- Force dark mode synchronously, BEFORE the bundled CSS loads and
         BEFORE React renders. This app is intentionally dark-only — we do
         NOT honor prefers-color-scheme: light on iPhone because the design
         system, brand visuals, and aurora gradients are tuned for dark
         surfaces only. No persistence (no localStorage / cookies — sandbox
         rules). The class+style are applied directly to <html> so the .dark
         CSS variables in index.css resolve on the first paint. -->
    <script>
      (function () {
        try {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } catch (e) { /* no-op */ }
      })();
    </script>
    <style>
      /* Paint the html/body dark IMMEDIATELY, before the bundled stylesheet
         loads. Matches the --background HSL declared for .dark inside
         index.css so there is no color jump at handoff. We do NOT use a
         prefers-color-scheme media query here: the app is dark-only and we
         want a dark first paint even when iOS is in light mode. */
      html, body {
        background-color: hsl(222, 47%, 7%);
        color: hsl(220, 30%, 96%);
        margin: 0;
        color-scheme: dark;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

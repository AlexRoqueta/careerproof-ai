          "name": "CareerProof AI",

          "inLanguage": "en-US"

          "@type": "WebApplication",

          "applicationCategory": "BusinessApplication",
          "applicationSubCategory": "Career planning",
          "operatingSystem": "Web",
          "browserRequirements": "Requires JavaScript and a modern browser",

              "name": "AI Exposure Report",

              "price": "3.00",
              "priceCurrency": "USD",

            "Task-level AI exposure breakdown",
            "Skills to build for AI disruption",
            "AI tools to learn for your role",
            "Safer adjacent next moves",
            "30/60/90-day action plan"

        {
          "@type": "FAQPage",
          "@id": "https://careerproof.app/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "How do I know if AI could affect my job?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Start with a free AI job-risk preview — enter your job title or a quick description and CareerProof AI returns an overall AI exposure score plus a peek at the most automatable tasks in your role. The full AI Exposure Report goes deeper with a task-by-task breakdown, skills to build, AI tools to learn, safer next moves, and a 30/60/90-day plan."
              }
            },
            {
              "@type": "Question",
              "name": "What is an AI job risk assessment?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "An AI job risk assessment is a structured read of how exposed a specific role is to AI automation. CareerProof AI combines current AI capabilities, labor-market signals, and your role profile to produce a directional exposure score and a task-level breakdown — not a prediction, but a signal you can plan around."

              "@type": "Question",

                "@type": "Answer",

            },

              "@type": "Question",
              "name": "Is the AI Exposure Report a guarantee?",

                "@type": "Answer",

            {
              "@type": "Question",

              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The free preview shows your AI exposure score and a snapshot of vulnerable tasks. The full report unlocks the complete roadmap: every task scored, the specific skills and AI tools to learn, safer adjacent roles, and a 30/60/90-day action plan you can act on this week."
              }

              }
            }
          ]
        }
      ]
    }
    </script>
    <!-- Force dark mode synchronously, BEFORE the bundled CSS loads and
         BEFORE React renders. This app is intentionally dark-only — we do
         NOT honor prefers-color-scheme: light on iPhone because the design
         system, brand visuals, and aurora gradients are tuned for dark
         surfaces only. No persistence (no localStorage / cookies — sandbox
         rules). The class+style are applied directly to <html> so the .dark
         CSS variables in index.css resolve on the first paint. -->
    <script>
      (function () {
        try {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } catch (e) { /* no-op */ }
      })();
    </script>
    <style>
      /* Paint the html/body dark IMMEDIATELY, before the bundled stylesheet
         loads. Matches the --background HSL declared for .dark inside
         index.css so there is no color jump at handoff. We do NOT use a
         prefers-color-scheme media query here: the app is dark-only and we
         want a dark first paint even when iOS is in light mode. */
      html, body {
        background-color: hsl(222, 47%, 7%);
        color: hsl(220, 30%, 96%);
        margin: 0;
        color-scheme: dark;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <text x="62" y="33" font-family="Inter, 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#ffffff">CareerProof <tspan fill="#7aa2ff">AI</tspan></text>
  </g>

  <g transform="translate(90, 230)">

    </text>
  </g>

  <g transform="translate(90, 540)">
    <rect x="0" y="0" width="430" height="56" rx="12" fill="url(#accent)"/>
    <text x="215" y="37" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#08101f">careerproof.app — start free</text>
  </g>

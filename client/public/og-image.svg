      <tspan x="0" y="0">Is your job exposed</tspan>
      <tspan x="0" y="82">to AI?</tspan>
    </text>
    <text x="0" y="172" font-family="Inter, 'Segoe UI', sans-serif" font-size="30" font-weight="500" fill="#cdd6f3">
      Get your free AI Exposure Report in under 2 minutes.
    </text>
    <text x="0" y="216" font-family="Inter, 'Segoe UI', sans-serif" font-size="30" font-weight="500" fill="#cdd6f3">
